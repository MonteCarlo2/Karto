# Локальный OpenSEO для SEO-работы над karto.pro (только localhost).
# Не выставляйте в интернет без auth — см. docs/SEO_OPENSEO_SETUP.md

services:
  open-seo:
    image: ${OPEN_SEO_IMAGE:-ghcr.io/every-app/open-seo:latest}
    restart: unless-stopped
    environment:
      - CLOUDFLARE_INCLUDE_PROCESS_ENV=true
      - PORT=${PORT:-3001}
      - ALLOWED_HOST=${ALLOWED_HOST:-}
      - AUTH_MODE=local_noauth
      - DATAFORSEO_API_KEY=${DATAFORSEO_API_KEY}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - VITE_SHOW_DEVTOOLS=false
    ports:
      - "127.0.0.1:${PORT:-3001}:${PORT:-3001}"
    volumes:
      - open_seo_data:/app/.wrangler

volumes:
  open_seo_data:
